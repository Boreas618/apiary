services:
  apiary:
    build:
      context: .
      dockerfile: Dockerfile
    security_opt:
      - seccomp=unconfined
      - label=disable
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    cgroup: private
    tmpfs:
      - /sys/fs/cgroup:rw,mode=755
    environment:
      RUST_BACKTRACE: "1"
      APIARY_OVERLAY_DIR: /var/lib/apiary/overlays
      CARGO_TARGET_DIR: /var/lib/apiary/target
    volumes:
      - .:/workspace
      - apiary-overlays:/var/lib/apiary/overlays
    working_dir: /workspace

volumes:
  apiary-overlays:
