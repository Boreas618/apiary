services:
  apiary:
    build:
      context: .
      dockerfile: Dockerfile
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - label=disable
    ports:
      - "8080:8080"
    cap_add:
      - SYS_ADMIN
      - MKNOD
    devices:
      - /dev/fuse
    cgroup: private
    tmpfs:
      - /sys/fs/cgroup:rw,mode=755
    environment:
      RUST_BACKTRACE: "1"
      APIARY_OVERLAY_DIR: /var/lib/apiary/overlays
      CARGO_TARGET_DIR: /var/lib/apiary/target
    volumes:
      - .:/workspace
      - apiary-overlays:/var/lib/apiary/overlays
      - /etc/resolv.conf:/etc/resolv.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace

volumes:
  apiary-overlays:
